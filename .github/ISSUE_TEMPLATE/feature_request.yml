name: Feature request
description: Propose an improvement to KiwiGuard
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please keep requests concrete and avoid including sensitive traffic data.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or operator problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should KiwiGuard do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Gateway
        - Policy and detectors
        - Verdict provider
        - PostgreSQL configuration
        - ClickHouse event pipeline
        - Control API
        - Console UI
        - Documentation
        - CI and repository standards
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I did not include real secrets, prompts, responses, customer data, or private deployment details.
          required: true
