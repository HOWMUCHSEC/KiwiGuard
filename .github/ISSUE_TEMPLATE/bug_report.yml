name: Bug report
description: Report a reproducible KiwiGuard bug using synthetic data
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve KiwiGuard. Do not include real secrets, prompts, responses, customer data, or private deployment details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Use synthetic data only.
      placeholder: |
        1. Start services with ...
        2. Send request ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: main@abcdef0
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, Node version, Docker version, and relevant configuration using redacted values.
  - type: checkboxes
    id: safety
    attributes:
      label: Data safety
      options:
        - label: I did not include real secrets, prompts, responses, customer data, or private deployment details.
          required: true
