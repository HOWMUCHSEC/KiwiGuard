services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: kiwiguard
      POSTGRES_USER: kiwiguard
      POSTGRES_PASSWORD: ${KIWIGUARD_POSTGRES_PASSWORD:?set KIWIGUARD_POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kiwiguard -d kiwiguard"]
      interval: 10s
      timeout: 5s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: kiwiguard
      CLICKHOUSE_USER: kiwiguard
      CLICKHOUSE_PASSWORD: ${KIWIGUARD_CLICKHOUSE_PASSWORD:?set KIWIGUARD_CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - clickhouse-logs:/var/log/clickhouse-server
      - ../internal/contexts/traffic/adapters/clickhouse/schema.sql:/docker-entrypoint-initdb.d/001_kiwiguard_traffic_events.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user kiwiguard --password \"$${CLICKHOUSE_PASSWORD}\" --query 'select 1'"]
      interval: 10s
      timeout: 5s
      retries: 20

  kiwiguard-migrate:
    image: ${KIWIGUARD_IMAGE:-ghcr.io/howmuchsec/kiwiguard:dev}
    restart: "no"
    command: ["migrate"]
    environment:
      KIWIGUARD_POSTGRES_DSN: postgres://kiwiguard:${KIWIGUARD_POSTGRES_PASSWORD:?set KIWIGUARD_POSTGRES_PASSWORD}@postgres:5432/kiwiguard?sslmode=disable
      KIWIGUARD_CLICKHOUSE_ADDR: clickhouse:9000
      KIWIGUARD_CLICKHOUSE_DATABASE: kiwiguard
      KIWIGUARD_CLICKHOUSE_USERNAME: kiwiguard
      KIWIGUARD_CLICKHOUSE_PASSWORD: ${KIWIGUARD_CLICKHOUSE_PASSWORD:?set KIWIGUARD_CLICKHOUSE_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy

  kiwiguard-gateway:
    image: ${KIWIGUARD_IMAGE:-ghcr.io/howmuchsec/kiwiguard:dev}
    restart: unless-stopped
    command: ["gateway"]
    environment: &kiwiguard-env
      KIWIGUARD_HTTP_ADDR: :8080
      KIWIGUARD_CONTROL_ADDR: :8081
      KIWIGUARD_CONTROL_AUTH_TOKEN: ${KIWIGUARD_CONTROL_AUTH_TOKEN:?set KIWIGUARD_CONTROL_AUTH_TOKEN}
      KIWIGUARD_BETA_OPENAI_API_KEY: ${KIWIGUARD_BETA_OPENAI_API_KEY:-}
      KIWIGUARD_CREDENTIAL_SECRET_OPENAI: ${KIWIGUARD_CREDENTIAL_SECRET_OPENAI:-}
      KIWIGUARD_POSTGRES_DSN: postgres://kiwiguard:${KIWIGUARD_POSTGRES_PASSWORD:?set KIWIGUARD_POSTGRES_PASSWORD}@postgres:5432/kiwiguard?sslmode=disable
      KIWIGUARD_CLICKHOUSE_ADDR: clickhouse:9000
      KIWIGUARD_CLICKHOUSE_DATABASE: kiwiguard
      KIWIGUARD_CLICKHOUSE_USERNAME: kiwiguard
      KIWIGUARD_CLICKHOUSE_PASSWORD: ${KIWIGUARD_CLICKHOUSE_PASSWORD:?set KIWIGUARD_CLICKHOUSE_PASSWORD}
      KIWIGUARD_EVENT_SPOOL_DIR: /var/lib/kiwiguard/event-spool
      KIWIGUARD_EVENT_SPOOL_MAX_BYTES: ${KIWIGUARD_EVENT_SPOOL_MAX_BYTES:-1073741824}
      KIWIGUARD_EVENT_SPOOL_MAX_AGE: ${KIWIGUARD_EVENT_SPOOL_MAX_AGE:-24h}
      KIWIGUARD_EVENT_SPOOL_REPLAY_INTERVAL: ${KIWIGUARD_EVENT_SPOOL_REPLAY_INTERVAL:-5s}
      KIWIGUARD_EVENT_SPOOL_BATCH_SIZE: ${KIWIGUARD_EVENT_SPOOL_BATCH_SIZE:-100}
      KIWIGUARD_EVENT_QUEUE_CAPACITY: ${KIWIGUARD_EVENT_QUEUE_CAPACITY:-1024}
      KIWIGUARD_EVENT_BATCH_SIZE: ${KIWIGUARD_EVENT_BATCH_SIZE:-100}
      KIWIGUARD_MAX_BODY_BYTES: ${KIWIGUARD_MAX_BODY_BYTES:-1048576}
      KIWIGUARD_UPSTREAM_TIMEOUT: ${KIWIGUARD_UPSTREAM_TIMEOUT:-30s}
      KIWIGUARD_VERDICT_TIMEOUT: ${KIWIGUARD_VERDICT_TIMEOUT:-5s}
      KIWIGUARD_SERVER_READ_HEADER_TIMEOUT: ${KIWIGUARD_SERVER_READ_HEADER_TIMEOUT:-5s}
      KIWIGUARD_SERVER_READ_TIMEOUT: ${KIWIGUARD_SERVER_READ_TIMEOUT:-15s}
      KIWIGUARD_SERVER_WRITE_TIMEOUT: ${KIWIGUARD_SERVER_WRITE_TIMEOUT:-60s}
      KIWIGUARD_SERVER_IDLE_TIMEOUT: ${KIWIGUARD_SERVER_IDLE_TIMEOUT:-120s}
      KIWIGUARD_SHUTDOWN_TIMEOUT: ${KIWIGUARD_SHUTDOWN_TIMEOUT:-10s}
      KIWIGUARD_LOG_LEVEL: ${KIWIGUARD_LOG_LEVEL:-info}
    volumes:
      - kiwiguard-spool:/var/lib/kiwiguard/event-spool
    healthcheck:
      test: ["CMD", "/kiwiguard", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kiwiguard-migrate:
        condition: service_completed_successfully

  kiwiguard-control:
    image: ${KIWIGUARD_IMAGE:-ghcr.io/howmuchsec/kiwiguard:dev}
    restart: unless-stopped
    command: ["control"]
    environment:
      <<: *kiwiguard-env
      KIWIGUARD_CONTROL_ADDR: :8081
    ports:
      - "127.0.0.1:8081:8081"
    volumes:
      - kiwiguard-spool:/var/lib/kiwiguard/event-spool
    healthcheck:
      test: ["CMD", "/kiwiguard", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kiwiguard-migrate:
        condition: service_completed_successfully

  kiwiguard-worker:
    image: ${KIWIGUARD_IMAGE:-ghcr.io/howmuchsec/kiwiguard:dev}
    restart: unless-stopped
    command: ["worker"]
    environment: *kiwiguard-env
    volumes:
      - kiwiguard-spool:/var/lib/kiwiguard/event-spool
    healthcheck:
      test: ["CMD", "/kiwiguard", "version"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      kiwiguard-migrate:
        condition: service_completed_successfully

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    environment:
      KIWIGUARD_PUBLIC_GATEWAY_HOST: ${KIWIGUARD_PUBLIC_GATEWAY_HOST:?set KIWIGUARD_PUBLIC_GATEWAY_HOST}
      KIWIGUARD_PUBLIC_CONTROL_HOST: ${KIWIGUARD_PUBLIC_CONTROL_HOST:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile.production:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    healthcheck:
      test: ["CMD", "caddy", "validate", "--config", "/etc/caddy/Caddyfile"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      kiwiguard-gateway:
        condition: service_started
      kiwiguard-control:
        condition: service_started

volumes:
  postgres-data:
  clickhouse-data:
  clickhouse-logs:
  kiwiguard-spool:
  caddy-data:
  caddy-config:
